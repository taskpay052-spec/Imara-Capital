<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Account | Imara Capital</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8FAFF 0%, #F1F4F9 100%);
            color: #1A2C3E;
            min-height: 100vh;
        }

        :root {
            --navy: #0A2540;
            --navy-light: #1A3A5C;
            --teal: #2C7A7B;
            --teal-dark: #235B5C;
            --gold: #F5A623;
            --gold-dark: #E09512;
            --gray-dark: #2D3A4B;
            --gray: #4A5568;
            --gray-light: #F8F9FA;
            --white: #FFFFFF;
            --green: #2E7D32;
            --red: #D32F2F;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.12);
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navigation */
        .navbar {
            background: var(--white);
            box-shadow: var(--shadow-sm);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .logo-imara {
            color: var(--navy);
        }

        .logo-capital {
            color: var(--teal);
        }

        .back-link {
            color: var(--gray);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            background: var(--gray-light);
        }

        .back-link:hover {
            color: var(--teal);
            background: rgba(44, 122, 123, 0.1);
            transform: translateX(-4px);
        }

        /* Main Content */
        .main-content {
            padding: 48px 0 80px;
        }

        /* Registration Card */
        .register-card {
            background: var(--white);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .register-header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .register-header p {
            color: var(--gray);
            font-size: 15px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--gray-dark);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group label .required {
            color: var(--red);
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--teal);
            font-size: 18px;
            opacity: 0.7;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #E9EDF2;
            border-radius: 16px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            background: var(--white);
        }

        .form-group input:hover {
            border-color: #CBD5E1;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 4px rgba(44, 122, 123, 0.1);
        }

        .form-group input.error {
            border-color: var(--red);
        }

        .error-message {
            color: var(--red);
            font-size: 12px;
            margin-top: 6px;
            display: block;
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            height: 4px;
            background: #E9EDF2;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .strength-fill {
            width: 0%;
            height: 100%;
            transition: all 0.3s ease;
        }

        .strength-fill.weak { background: var(--red); width: 33%; }
        .strength-fill.medium { background: var(--gold); width: 66%; }
        .strength-fill.strong { background: var(--green); width: 100%; }

        .strength-text {
            font-size: 12px;
            color: var(--gray);
        }

        /* Terms Checkbox */
        .terms-group {
            margin: 24px 0;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox-wrapper input {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--teal);
        }

        .checkbox-wrapper span {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
        }

        .checkbox-wrapper a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 500;
        }

        .checkbox-wrapper a:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--teal);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--teal-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(44, 122, 123, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Login Link */
        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E9EDF2;
        }

        .login-link p {
            color: var(--gray);
            font-size: 14px;
        }

        .login-link a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Success Message */
        .success-message {
            text-align: center;
            padding: 32px;
            animation: fadeIn 0.5s ease;
        }

        .success-message i {
            font-size: 64px;
            color: var(--green);
            margin-bottom: 20px;
        }

        .success-message h2 {
            font-size: 24px;
            color: var(--navy);
            margin-bottom: 12px;
        }

        .success-message p {
            color: var(--gray);
            margin-bottom: 24px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .register-card {
                padding: 32px 24px;
            }

            .register-header h1 {
                font-size: 28px;
            }

            .register-header p {
                font-size: 14px;
            }

            .form-group input {
                padding: 12px 16px 12px 44px;
                font-size: 15px;
            }

            .input-wrapper i {
                left: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <span class="logo-imara">Imara</span><span class="logo-capital">Capital</span>
        </a>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</nav>

<!-- Main Content -->
<main class="main-content">
    <div class="container">
        <div class="register-card" id="registerCard">
            <div class="register-header">
                <h1>Create an Account</h1>
                <p>Join Imara Capital and access fast, fair loans</p>
            </div>

            <form id="registerForm">
                <!-- Full Name -->
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="e.g., Grace Wanjiku" autocomplete="name">
                    </div>
                    <div class="error-message" id="nameError"></div>
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label>Phone Number (M-Pesa registered) <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" placeholder="e.g., 0712345678" autocomplete="tel">
                    </div>
                    <div class="error-message" id="phoneError"></div>
                </div>

                <!-- Email Address -->
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="grace@example.com" autocomplete="email">
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>

                <!-- ID Number -->
                <div class="form-group">
                    <label>National ID Number <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="nationalId" placeholder="e.g., 12345678" autocomplete="off">
                    </div>
                    <div class="error-message" id="idError"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Create a strong password">
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-text" id="strengthText">Password strength</span>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                    </div>
                    <div class="error-message" id="confirmError"></div>
                </div>

                <!-- Terms and Conditions -->
                <div class="terms-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="termsCheckbox">
                        <span>I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a> and <a href="privacy-policy.html" target="_blank">Privacy Policy</a> <span class="required">*</span></span>
                    </label>
                    <div class="error-message" id="termsError"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" id="submitBtn">Create Account →</button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>

        <!-- Success Message (hidden initially) -->
        <div id="successMessage" style="display: none;" class="register-card"></div>
    </div>
</main>

<script>
    // Password Strength Checker
    const passwordInput = document.getElementById('password');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');

    function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        if (password.length === 0) {
            strengthFill.className = 'strength-fill';
            strengthFill.style.width = '0%';
            strengthText.textContent = 'Password strength';
            strengthText.style.color = 'var(--gray)';
            return;
        }

        if (strength <= 2) {
            strengthFill.className = 'strength-fill weak';
            strengthFill.style.width = '33%';
            strengthText.textContent = 'Weak password';
            strengthText.style.color = 'var(--red)';
        } else if (strength <= 4) {
            strengthFill.className = 'strength-fill medium';
            strengthFill.style.width = '66%';
            strengthText.textContent = 'Medium password';
            strengthText.style.color = 'var(--gold)';
        } else {
            strengthFill.className = 'strength-fill strong';
            strengthFill.style.width = '100%';
            strengthText.textContent = 'Strong password';
            strengthText.style.color = 'var(--green)';
        }
    }

    passwordInput.addEventListener('input', function() {
        checkPasswordStrength(this.value);
    });

    // Form Validation
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    
    function validateForm() {
        let isValid = true;
        
        // Full Name
        const fullName = document.getElementById('fullName').value.trim();
        const nameError = document.getElementById('nameError');
        if (fullName === '') {
            nameError.textContent = 'Please enter your full name';
            document.getElementById('fullName').classList.add('error');
            isValid = false;
        } else if (fullName.length < 3) {
            nameError.textContent = 'Name must be at least 3 characters';
            document.getElementById('fullName').classList.add('error');
            isValid = false;
        } else {
            nameError.textContent = '';
            document.getElementById('fullName').classList.remove('error');
        }
        
        // Phone Number
        const phone = document.getElementById('phone').value.trim();
        const phoneError = document.getElementById('phoneError');
        const phoneRegex = /^07[0-9]{8}$|^01[0-9]{8}$|^[0-9]{9}$/;
        if (phone === '') {
            phoneError.textContent = 'Please enter your phone number';
            document.getElementById('phone').classList.add('error');
            isValid = false;
        } else if (!phoneRegex.test(phone)) {
            phoneError.textContent = 'Enter a valid Kenyan phone number (e.g., 0712345678)';
            document.getElementById('phone').classList.add('error');
            isValid = false;
        } else {
            phoneError.textContent = '';
            document.getElementById('phone').classList.remove('error');
        }
        
        // Email (optional but validate if provided)
        const email = document.getElementById('email').value.trim();
        const emailError = document.getElementById('emailError');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email !== '' && !emailRegex.test(email)) {
            emailError.textContent = 'Enter a valid email address';
            document.getElementById('email').classList.add('error');
            isValid = false;
        } else {
            emailError.textContent = '';
            document.getElementById('email').classList.remove('error');
        }
        
        // National ID
        const nationalId = document.getElementById('nationalId').value.trim();
        const idError = document.getElementById('idError');
        const idRegex = /^[0-9]{7,8}$/;
        if (nationalId === '') {
            idError.textContent = 'Please enter your National ID number';
            document.getElementById('nationalId').classList.add('error');
            isValid = false;
        } else if (!idRegex.test(nationalId)) {
            idError.textContent = 'Enter a valid 7-8 digit ID number';
            document.getElementById('nationalId').classList.add('error');
            isValid = false;
        } else {
            idError.textContent = '';
            document.getElementById('nationalId').classList.remove('error');
        }
        
        // Password
        const password = document.getElementById('password').value;
        const passwordError = document.getElementById('passwordError');
        if (password === '') {
            passwordError.textContent = 'Please create a password';
            document.getElementById('password').classList.add('error');
            isValid = false;
        } else if (password.length < 6) {
            passwordError.textContent = 'Password must be at least 6 characters';
            document.getElementById('password').classList.add('error');
            isValid = false;
        } else {
            passwordError.textContent = '';
            document.getElementById('password').classList.remove('error');
        }
        
        // Confirm Password
        const confirmPassword = document.getElementById('confirmPassword').value;
        const confirmError = document.getElementById('confirmError');
        if (confirmPassword === '') {
            confirmError.textContent = 'Please confirm your password';
            document.getElementById('confirmPassword').classList.add('error');
            isValid = false;
        } else if (password !== confirmPassword) {
            confirmError.textContent = 'Passwords do not match';
            document.getElementById('confirmPassword').classList.add('error');
            isValid = false;
        } else {
            confirmError.textContent = '';
            document.getElementById('confirmPassword').classList.remove('error');
        }
        
        // Terms Checkbox
        const termsCheckbox = document.getElementById('termsCheckbox');
        const termsError = document.getElementById('termsError');
        if (!termsCheckbox.checked) {
            termsError.textContent = 'You must agree to the Terms & Conditions';
            isValid = false;
        } else {
            termsError.textContent = '';
        }
        
        return isValid;
    }
    
    // Real-time validation on input
    const inputs = ['fullName', 'phone', 'email', 'nationalId', 'password', 'confirmPassword'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            validateForm();
        });
    });
    
    document.getElementById('termsCheckbox').addEventListener('change', () => {
        validateForm();
    });
    
    // Form Submission
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        if (validateForm()) {
            // Generate a reference number for the new user
            const refNumber = 'IM-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 1000000);
            const userName = document.getElementById('fullName').value.trim();
            
            // Store user data in localStorage (simulated)
            const userData = {
                fullName: userName,
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                nationalId: document.getElementById('nationalId').value.trim(),
                registeredAt: new Date().toISOString(),
                reference: refNumber
            };
            
            localStorage.setItem('imaraUser', JSON.stringify(userData));
            
            // Hide form, show success
            document.getElementById('registerCard').style.display = 'none';
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.innerHTML = `
                <div class="success-message">
                    <i class="fas fa-check-circle"></i>
                    <h2>Account Created Successfully!</h2>
                    <p>Welcome to Imara Capital, ${userName}!</p>
                    <div class="success-details" style="background: #F8F9FA; border-radius: 16px; padding: 16px; margin: 20px 0; text-align: left;">
                        <p style="margin-bottom: 8px;"><strong>Reference:</strong> ${refNumber}</p>
                        <p style="margin-bottom: 8px;"><strong>Phone:</strong> ${userData.phone}</p>
                        <p><strong>Email:</strong> ${userData.email || 'Not provided'}</p>
                    </div>
                    <p>You can now log in and start your loan application.</p>
                    <a href="login.html" class="btn btn-primary" style="margin-top: 20px; display: inline-flex;">Proceed to Login →</a>
                </div>
            `;
            
            console.log('User registered:', userData);
        }
    });
</script>

</body>
</html>
