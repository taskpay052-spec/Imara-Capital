<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Loan History | Imara Capital</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8FAFF 0%, #F1F4F9 100%);
            color: #1A2C3E;
            min-height: 100vh;
        }

        :root {
            --navy: #0A2540;
            --navy-light: #1A3A5C;
            --teal: #2C7A7B;
            --teal-dark: #235B5C;
            --gold: #F5A623;
            --gold-dark: #E09512;
            --gray-dark: #2D3A4B;
            --gray: #4A5568;
            --gray-light: #F8F9FA;
            --white: #FFFFFF;
            --green: #2E7D32;
            --red: #D32F2F;
            --orange: #F39C12;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        /* Navigation */
        .navbar {
            background: var(--white);
            box-shadow: var(--shadow-sm);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .logo-imara {
            color: var(--navy);
        }

        .logo-capital {
            color: var(--teal);
        }

        .back-btn {
            background: var(--gray-light);
            border: 1px solid #E2E8F0;
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .back-btn:hover {
            background: var(--teal);
            border-color: var(--teal);
            color: var(--white);
            transform: translateX(-4px);
        }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 4px;
        }

        .page-header p {
            color: var(--gray);
            font-size: 13px;
        }

        /* Stats Row - Compact Horizontal */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 16px;
            padding: 12px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            background: rgba(44, 122, 123, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 18px;
            color: var(--teal);
        }

        .stat-info h4 {
            font-size: 16px;
            font-weight: 800;
            color: var(--navy);
            line-height: 1.2;
        }

        .stat-info p {
            font-size: 10px;
            color: var(--gray);
        }

        /* Filters - Compact */
        .filters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 40px;
            background: var(--white);
            border: 1px solid #E2E8F0;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            color: var(--gray);
        }

        .filter-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .filter-btn.active {
            background: var(--teal);
            border-color: var(--teal);
            color: var(--white);
        }

        .date-range {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .date-input {
            padding: 6px 10px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            background: var(--white);
        }

        /* Transaction Container - Compact */
        .transactions-container {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .transaction-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .transaction-table th {
            text-align: left;
            padding: 12px 12px;
            background: var(--gray-light);
            font-weight: 600;
            color: var(--navy);
            font-size: 11px;
            border-bottom: 1px solid #E2E8F0;
        }

        .transaction-table td {
            padding: 12px 12px;
            border-bottom: 1px solid #E9EDF2;
            font-size: 12px;
        }

        .transaction-table tr:last-child td {
            border-bottom: none;
        }

        .transaction-table tr:hover {
            background: var(--gray-light);
        }

        .transaction-type {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .type-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .type-icon.disbursement {
            background: rgba(46, 125, 50, 0.1);
            color: var(--green);
        }

        .type-icon.payment {
            background: rgba(44, 122, 123, 0.1);
            color: var(--teal);
        }

        .type-icon.membership {
            background: rgba(245, 166, 35, 0.1);
            color: var(--gold);
        }

        .type-icon i {
            font-size: 12px;
        }

        .amount-positive {
            color: var(--green);
            font-weight: 700;
        }

        .amount-negative {
            color: var(--red);
            font-weight: 700;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        .status-badge.completed {
            background: rgba(46, 125, 50, 0.1);
            color: var(--green);
        }

        .status-badge.pending {
            background: rgba(243, 156, 18, 0.1);
            color: var(--orange);
        }

        /* Pagination - Compact */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 16px;
            border-top: 1px solid #E9EDF2;
        }

        .page-btn {
            padding: 6px 12px;
            border-radius: 30px;
            background: var(--white);
            border: 1px solid #E2E8F0;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
        }

        .page-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .page-btn.active {
            background: var(--teal);
            border-color: var(--teal);
            color: var(--white);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state i {
            font-size: 48px;
            color: var(--gray-light);
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--navy);
            margin-bottom: 6px;
        }

        .empty-state p {
            color: var(--gray);
            font-size: 13px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0 20px;
            }
            
            .main-container {
                padding: 16px;
            }
            
            .page-header h1 {
                font-size: 24px;
            }
            
            /* Stats Row - 2x2 grid on mobile */
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                margin-bottom: 16px;
            }
            
            .stat-card {
                padding: 10px 8px;
                gap: 8px;
            }
            
            .stat-icon {
                width: 32px;
                height: 32px;
            }
            
            .stat-icon i {
                font-size: 14px;
            }
            
            .stat-info h4 {
                font-size: 14px;
            }
            
            .stat-info p {
                font-size: 9px;
            }
            
            .filters {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            
            .filter-tabs {
                justify-content: center;
            }
            
            .date-range {
                justify-content: space-between;
            }
            
            /* Table becomes scrollable on mobile */
            .transactions-container {
                overflow-x: auto;
            }
            
            .transaction-table {
                min-width: 600px;
            }
            
            .transaction-table th,
            .transaction-table td {
                padding: 10px 8px;
            }
            
            .transaction-type span {
                font-size: 11px;
            }
        }
        
        @media (max-width: 480px) {
            .stats-row {
                gap: 8px;
            }
            
            .stat-card {
                padding: 8px 6px;
            }
            
            .stat-icon {
                width: 28px;
                height: 28px;
            }
            
            .stat-icon i {
                font-size: 12px;
            }
            
            .stat-info h4 {
                font-size: 12px;
            }
            
            .filter-btn {
                padding: 5px 12px;
                font-size: 11px;
            }
            
            .date-input {
                font-size: 11px;
                padding: 5px 8px;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <span class="logo-imara">Imara</span><span class="logo-capital">Capital</span>
        </a>
        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button>
    </div>
</nav>

<!-- Main Content -->
<main class="main-container">
    <div class="page-header">
        <h1>Loan History</h1>
        <p>View all your transactions and payments</p>
    </div>

    <!-- Stats Row - Compact Horizontal -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-info">
                <h4 id="totalDisbursed">KSh 165K</h4>
                <p>Disbursed</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
            <div class="stat-info">
                <h4 id="totalPaid">KSh 98.5K</h4>
                <p>Paid</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-info">
                <h4 id="totalPending">KSh 0</h4>
                <p>Pending</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar"></i></div>
            <div class="stat-info">
                <h4 id="totalTransactions">12</h4>
                <p>Transactions</p>
            </div>
        </div>
    </div>

    <!-- Filters - Compact -->
    <div class="filters">
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="disbursement">Disbursements</button>
            <button class="filter-btn" data-filter="payment">Payments</button>
            <button class="filter-btn" data-filter="membership">Membership</button>
        </div>
        <div class="date-range">
            <input type="month" id="startMonth" class="date-input" placeholder="Start">
            <span>—</span>
            <input type="month" id="endMonth" class="date-input" placeholder="End">
            <button class="filter-btn" id="applyDateFilter">Apply</button>
        </div>
    </div>

    <!-- Transactions Table -->
    <div class="transactions-container">
        <table class="transaction-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="transactionsBody">
                <!-- Transactions will be loaded here -->
            </tbody>
        </table>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>
</main>

<script>
    // Sample transaction data
    const transactionsData = [
        { id: 1, date: "2025-03-15", description: "Personal Loan Disbursement", type: "disbursement", amount: 50000, status: "completed", reference: "LN-20250315-001" },
        { id: 2, date: "2025-03-20", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20250320-001" },
        { id: 3, date: "2025-02-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20250215-001" },
        { id: 4, date: "2025-02-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20250201-001" },
        { id: 5, date: "2025-01-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20250115-001" },
        { id: 6, date: "2025-01-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20250101-001" },
        { id: 7, date: "2024-12-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20241215-001" },
        { id: 8, date: "2024-12-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20241201-001" },
        { id: 9, date: "2024-11-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20241115-001" },
        { id: 10, date: "2024-11-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20241101-001" },
        { id: 11, date: "2024-10-10", description: "Business Loan Disbursement", type: "disbursement", amount: 75000, status: "completed", reference: "LN-20241010-001" },
        { id: 12, date: "2024-08-01", description: "Asset Finance Disbursement", type: "disbursement", amount: 25000, status: "completed", reference: "LN-20240801-001" }
    ];

    let currentFilter = 'all';
    let currentPage = 1;
    const itemsPerPage = 10;
    let filteredTransactions = [...transactionsData];

    function updateStats(transactions) {
        const totalDisbursed = transactions
            .filter(t => t.type === 'disbursement' && t.status === 'completed')
            .reduce((sum, t) => sum + t.amount, 0);
        
        const totalPaid = Math.abs(transactions
            .filter(t => (t.type === 'payment' || t.type === 'membership') && t.status === 'completed')
            .reduce((sum, t) => sum + t.amount, 0));
        
        const totalPending = Math.abs(transactions
            .filter(t => t.status === 'pending')
            .reduce((sum, t) => sum + (t.amount < 0 ? t.amount : 0), 0));
        
        const totalTransactions = transactions.length;
        
        document.getElementById('totalDisbursed').textContent = totalDisbursed >= 100000 ? `KSh ${Math.round(totalDisbursed / 1000)}K` : `KSh ${totalDisbursed.toLocaleString()}`;
        document.getElementById('totalPaid').textContent = totalPaid >= 100000 ? `KSh ${Math.round(totalPaid / 1000)}K` : `KSh ${totalPaid.toLocaleString()}`;
        document.getElementById('totalPending').textContent = totalPending > 0 ? (totalPending >= 100000 ? `KSh ${Math.round(totalPending / 1000)}K` : `KSh ${totalPending.toLocaleString()}`) : 'KSh 0';
        document.getElementById('totalTransactions').textContent = totalTransactions;
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-KE', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function getTypeIcon(type) {
        switch(type) {
            case 'disbursement': return '<div class="type-icon disbursement"><i class="fas fa-arrow-down"></i></div>';
            case 'payment': return '<div class="type-icon payment"><i class="fas fa-arrow-up"></i></div>';
            case 'membership': return '<div class="type-icon membership"><i class="fas fa-crown"></i></div>';
            default: return '<div class="type-icon"><i class="fas fa-receipt"></i></div>';
        }
    }

    function getStatusBadge(status) {
        switch(status) {
            case 'completed': return '<span class="status-badge completed">Completed</span>';
            case 'pending': return '<span class="status-badge pending">Pending</span>';
            default: return '<span class="status-badge">' + status + '</span>';
        }
    }

    function renderTransactions() {
        const tbody = document.getElementById('transactionsBody');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageTransactions = filteredTransactions.slice(start, end);
        
        if (pageTransactions.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" style="text-align: center; padding: 40px;">
                        <div class="empty-state">
                            <i class="fas fa-receipt"></i>
                            <h3>No transactions found</h3>
                            <p>Try adjusting your filters</p>
                        </div>
                    </td>
                </tr>
            `;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        tbody.innerHTML = pageTransactions.map(transaction => `
            <tr>
                <td style="white-space: nowrap;">${formatDate(transaction.date)}</td>
                <td>
                    <div class="transaction-type">
                        ${getTypeIcon(transaction.type)}
                        <span>${transaction.description}</span>
                    </div>
                </td>
                <td>
                    <span class="${transaction.amount > 0 ? 'amount-positive' : 'amount-negative'}">
                        ${transaction.amount > 0 ? '+' : '-'}KSh ${Math.abs(transaction.amount).toLocaleString()}
                    </span>
                </td>
                <td>${getStatusBadge(transaction.status)}</td>
            </tr>
        `).join('');
        
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredTransactions.length / itemsPerPage);
        const paginationDiv = document.getElementById('pagination');
        
        if (totalPages <= 1) {
            paginationDiv.innerHTML = '';
            return;
        }
        
        let pagesHtml = '';
        pagesHtml += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.5"' : ''}>‹</button>`;
        
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                pagesHtml += `<span style="padding: 6px;">...</span>`;
            }
        }
        
        pagesHtml += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.5"' : ''}>›</button>`;
        paginationDiv.innerHTML = pagesHtml;
    }

    function changePage(page) {
        const totalPages = Math.ceil(filteredTransactions.length / itemsPerPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTransactions();
    }

    function applyFilters() {
        let filtered = [...transactionsData];
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(t => t.type === currentFilter);
        }
        
        const startMonth = document.getElementById('startMonth').value;
        const endMonth = document.getElementById('endMonth').value;
        
        if (startMonth) {
            filtered = filtered.filter(t => t.date >= `${startMonth}-01`);
        }
        if (endMonth) {
            filtered = filtered.filter(t => t.date <= `${endMonth}-31`);
        }
        
        filteredTransactions = filtered;
        currentPage = 1;
        updateStats(filtered);
        renderTransactions();
    }

    // Filter button handlers
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            applyFilters();
        });
    });

    document.getElementById('applyDateFilter').addEventListener('click', applyFilters);

    function checkAuth() {
        const session = localStorage.getItem('imaraSession') || sessionStorage.getItem('imaraSession');
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        return true;
    }

    function goBack() {
        window.history.back();
    }

    document.getElementById('backBtn').addEventListener('click', goBack);

    // Initialize
    if (checkAuth()) {
        updateStats(transactionsData);
        renderTransactions();
    }
</script>

</body>
</html>
