<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Loan History | Imara Capital</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8FAFF 0%, #F1F4F9 100%);
            color: #1A2C3E;
            min-height: 100vh;
        }

        :root {
            --navy: #0A2540;
            --navy-light: #1A3A5C;
            --teal: #2C7A7B;
            --teal-dark: #235B5C;
            --gold: #F5A623;
            --gold-dark: #E09512;
            --gray-dark: #2D3A4B;
            --gray: #4A5568;
            --gray-light: #F8F9FA;
            --white: #FFFFFF;
            --green: #2E7D32;
            --red: #D32F2F;
            --orange: #F39C12;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        /* Navigation */
        .navbar {
            background: var(--white);
            box-shadow: var(--shadow-sm);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .logo-imara {
            color: var(--navy);
        }

        .logo-capital {
            color: var(--teal);
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gray);
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: var(--gray-light);
            color: var(--teal);
        }

        .nav-links a.active {
            background: var(--teal);
            color: var(--white);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--teal), var(--navy));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #E2E8F0;
            padding: 8px 16px;
            border-radius: 40px;
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--red);
            border-color: var(--red);
            color: var(--white);
        }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Header */
        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--gray);
            font-size: 16px;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            background: rgba(44, 122, 123, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 24px;
            color: var(--teal);
        }

        .stat-info h4 {
            font-size: 24px;
            font-weight: 800;
            color: var(--navy);
        }

        .stat-info p {
            font-size: 13px;
            color: var(--gray);
        }

        /* Filters */
        .filters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 40px;
            background: var(--white);
            border: 1px solid #E2E8F0;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            color: var(--gray);
        }

        .filter-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .filter-btn.active {
            background: var(--teal);
            border-color: var(--teal);
            color: var(--white);
        }

        .date-range {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .date-input {
            padding: 8px 12px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        /* Transaction Table */
        .transactions-container {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .transaction-table {
            width: 100%;
            border-collapse: collapse;
        }

        .transaction-table th {
            text-align: left;
            padding: 16px 20px;
            background: var(--gray-light);
            font-weight: 600;
            color: var(--navy);
            font-size: 13px;
            border-bottom: 1px solid #E2E8F0;
        }

        .transaction-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #E9EDF2;
            font-size: 14px;
        }

        .transaction-table tr:last-child td {
            border-bottom: none;
        }

        .transaction-table tr:hover {
            background: var(--gray-light);
        }

        .transaction-type {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .type-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .type-icon.disbursement {
            background: rgba(46, 125, 50, 0.1);
            color: var(--green);
        }

        .type-icon.payment {
            background: rgba(44, 122, 123, 0.1);
            color: var(--teal);
        }

        .type-icon.membership {
            background: rgba(245, 166, 35, 0.1);
            color: var(--gold);
        }

        .type-icon.interest {
            background: rgba(243, 156, 18, 0.1);
            color: var(--orange);
        }

        .amount-positive {
            color: var(--green);
            font-weight: 700;
        }

        .amount-negative {
            color: var(--red);
            font-weight: 700;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.completed {
            background: rgba(46, 125, 50, 0.1);
            color: var(--green);
        }

        .status-badge.pending {
            background: rgba(243, 156, 18, 0.1);
            color: var(--orange);
        }

        .status-badge.failed {
            background: rgba(211, 47, 47, 0.1);
            color: var(--red);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 24px;
            border-top: 1px solid #E9EDF2;
        }

        .page-btn {
            padding: 8px 14px;
            border-radius: 40px;
            background: var(--white);
            border: 1px solid #E2E8F0;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .page-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .page-btn.active {
            background: var(--teal);
            border-color: var(--teal);
            color: var(--white);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 64px;
            color: var(--gray-light);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--gray);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .transaction-table {
                display: block;
                overflow-x: auto;
            }
        }

        @media (max-width: 768px) {
            .nav-container {
                padding: 0 20px;
            }
            
            .main-container {
                padding: 20px;
            }
            
            .nav-links {
                display: none;
            }
            
            .page-header h1 {
                font-size: 28px;
            }
            
            .stats-row {
                grid-template-columns: 1fr;
            }
            
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .date-range {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <span class="logo-imara">Imara</span><span class="logo-capital">Capital</span>
        </a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="my-loans.html">My Loans</a>
            <a href="apply.html">Apply</a>
            <a href="membership.html">Membership</a>
            <a href="profile.html">Profile</a>
        </div>
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">GW</div>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="main-container">
    <div class="page-header">
        <h1>Loan History</h1>
        <p>View all your transactions, payments, and loan activities</p>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-info">
                <h4 id="totalDisbursed">KSh 165,000</h4>
                <p>Total Disbursed</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
            <div class="stat-info">
                <h4 id="totalPaid">KSh 98,500</h4>
                <p>Total Paid</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-info">
                <h4 id="totalPending">KSh 0</h4>
                <p>Pending Payments</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar"></i></div>
            <div class="stat-info">
                <h4 id="totalTransactions">12</h4>
                <p>Total Transactions</p>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters">
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="disbursement">Disbursements</button>
            <button class="filter-btn" data-filter="payment">Payments</button>
            <button class="filter-btn" data-filter="membership">Membership</button>
        </div>
        <div class="date-range">
            <input type="month" id="startMonth" class="date-input" placeholder="Start">
            <span>—</span>
            <input type="month" id="endMonth" class="date-input" placeholder="End">
            <button class="filter-btn" id="applyDateFilter">Apply</button>
        </div>
    </div>

    <!-- Transactions Table -->
    <div class="transactions-container">
        <table class="transaction-table" id="transactionTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Reference</th>
                </tr>
            </thead>
            <tbody id="transactionsBody">
                <!-- Transactions will be loaded here -->
            </tbody>
        </table>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>
</main>

<script>
    // Sample transaction data
    const transactionsData = [
        { id: 1, date: "2025-03-15", description: "Personal Loan Disbursement", type: "disbursement", amount: 50000, status: "completed", reference: "LN-20250315-001" },
        { id: 2, date: "2025-03-20", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20250320-001" },
        { id: 3, date: "2025-02-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20250215-001" },
        { id: 4, date: "2025-02-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20250201-001" },
        { id: 5, date: "2025-01-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20250115-001" },
        { id: 6, date: "2025-01-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20250101-001" },
        { id: 7, date: "2024-12-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20241215-001" },
        { id: 8, date: "2024-12-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20241201-001" },
        { id: 9, date: "2024-11-15", description: "Loan Repayment", type: "payment", amount: -4458, status: "completed", reference: "PAY-20241115-001" },
        { id: 10, date: "2024-11-01", description: "Premium Membership Fee", type: "membership", amount: -499, status: "completed", reference: "MEM-20241101-001" },
        { id: 11, date: "2024-10-10", description: "Business Loan Disbursement", type: "disbursement", amount: 75000, status: "completed", reference: "LN-20241010-001" },
        { id: 12, date: "2024-08-01", description: "Asset Finance Disbursement", type: "disbursement", amount: 25000, status: "completed", reference: "LN-20240801-001" }
    ];

    let currentFilter = 'all';
    let currentPage = 1;
    const itemsPerPage = 8;
    let filteredTransactions = [...transactionsData];

    // Load user data
    function loadUserData() {
        const session = localStorage.getItem('imaraSession') || sessionStorage.getItem('imaraSession');
        if (session) {
            try {
                const sessionData = JSON.parse(session);
                if (sessionData.isLoggedIn && sessionData.user) {
                    const user = sessionData.user;
                    const initials = user.fullName?.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) || 'GW';
                    document.getElementById('userAvatar').textContent = initials;
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    // Calculate stats
    function updateStats(transactions) {
        const totalDisbursed = transactions
            .filter(t => t.type === 'disbursement' && t.status === 'completed')
            .reduce((sum, t) => sum + t.amount, 0);
        
        const totalPaid = Math.abs(transactions
            .filter(t => (t.type === 'payment' || t.type === 'membership') && t.status === 'completed')
            .reduce((sum, t) => sum + t.amount, 0));
        
        const totalPending = Math.abs(transactions
            .filter(t => t.status === 'pending')
            .reduce((sum, t) => sum + (t.amount < 0 ? t.amount : 0), 0));
        
        const totalTransactions = transactions.length;
        
        document.getElementById('totalDisbursed').textContent = `KSh ${totalDisbursed.toLocaleString()}`;
        document.getElementById('totalPaid').textContent = `KSh ${totalPaid.toLocaleString()}`;
        document.getElementById('totalPending').textContent = totalPending > 0 ? `KSh ${totalPending.toLocaleString()}` : 'KSh 0';
        document.getElementById('totalTransactions').textContent = totalTransactions;
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-KE', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function getTypeIcon(type) {
        switch(type) {
            case 'disbursement': return '<div class="type-icon disbursement"><i class="fas fa-arrow-down"></i></div>';
            case 'payment': return '<div class="type-icon payment"><i class="fas fa-arrow-up"></i></div>';
            case 'membership': return '<div class="type-icon membership"><i class="fas fa-crown"></i></div>';
            default: return '<div class="type-icon"><i class="fas fa-receipt"></i></div>';
        }
    }

    function getTypeName(type) {
        switch(type) {
            case 'disbursement': return 'Disbursement';
            case 'payment': return 'Loan Payment';
            case 'membership': return 'Membership';
            default: return type;
        }
    }

    function getStatusBadge(status) {
        switch(status) {
            case 'completed': return '<span class="status-badge completed">Completed</span>';
            case 'pending': return '<span class="status-badge pending">Pending</span>';
            case 'failed': return '<span class="status-badge failed">Failed</span>';
            default: return '<span class="status-badge">' + status + '</span>';
        }
    }

    function renderTransactions() {
        const tbody = document.getElementById('transactionsBody');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageTransactions = filteredTransactions.slice(start, end);
        
        if (pageTransactions.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align: center; padding: 60px;">
                        <div class="empty-state">
                            <i class="fas fa-receipt"></i>
                            <h3>No transactions found</h3>
                            <p>Try adjusting your filters or date range</p>
                        </div>
                    </td>
                </tr>
            `;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        tbody.innerHTML = pageTransactions.map(transaction => `
            <tr>
                <td>${formatDate(transaction.date)}</td>
                <td>
                    <div class="transaction-type">
                        ${getTypeIcon(transaction.type)}
                        <span>${transaction.description}</span>
                    </div>
                </td>
                <td>${getTypeName(transaction.type)}</td>
                <td>
                    <span class="${transaction.amount > 0 ? 'amount-positive' : 'amount-negative'}">
                        ${transaction.amount > 0 ? '+' : ''}KSh ${Math.abs(transaction.amount).toLocaleString()}
                    </span>
                </td>
                <td>${getStatusBadge(transaction.status)}</td>
                <td><span style="font-family: monospace; font-size: 12px;">${transaction.reference}</span></td>
            </tr>
        `).join('');
        
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredTransactions.length / itemsPerPage);
        const paginationDiv = document.getElementById('pagination');
        
        if (totalPages <= 1) {
            paginationDiv.innerHTML = '';
            return;
        }
        
        let pagesHtml = '';
        
        // Previous button
        pagesHtml += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.5"' : ''}>‹</button>`;
        
        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                pagesHtml += `<span style="padding: 8px;">...</span>`;
            }
        }
        
        // Next button
        pagesHtml += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.5"' : ''}>›</button>`;
        
        paginationDiv.innerHTML = pagesHtml;
    }

    function changePage(page) {
        const totalPages = Math.ceil(filteredTransactions.length / itemsPerPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTransactions();
    }

    function applyFilters() {
        let filtered = [...transactionsData];
        
        // Apply type filter
        if (currentFilter !== 'all') {
            filtered = filtered.filter(t => t.type === currentFilter);
        }
        
        // Apply date filter
        const startMonth = document.getElementById('startMonth').value;
        const endMonth = document.getElementById('endMonth').value;
        
        if (startMonth) {
            filtered = filtered.filter(t => t.date >= `${startMonth}-01`);
        }
        if (endMonth) {
            filtered = filtered.filter(t => t.date <= `${endMonth}-31`);
        }
        
        filteredTransactions = filtered;
        currentPage = 1;
        updateStats(filtered);
        renderTransactions();
    }

    // Filter button handlers
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            applyFilters();
        });
    });

    document.getElementById('applyDateFilter').addEventListener('click', applyFilters);

    function checkAuth() {
        const session = localStorage.getItem('imaraSession') || sessionStorage.getItem('imaraSession');
        if (!session) {
            window.location.href = 'login.html';
            return false;
        }
        return true;
    }

    function logout() {
        localStorage.removeItem('imaraSession');
        sessionStorage.removeItem('imaraSession');
        window.location.href = 'index.html';
    }

    document.getElementById('logoutBtn').addEventListener('click', logout);

    // Initialize
    if (checkAuth()) {
        loadUserData();
        updateStats(transactionsData);
        renderTransactions();
    }
</script>

</body>
</html>
