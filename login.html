<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign In | Imara Capital</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8FAFF 0%, #F1F4F9 100%);
            color: #1A2C3E;
            min-height: 100vh;
        }

        :root {
            --navy: #0A2540;
            --navy-light: #1A3A5C;
            --teal: #2C7A7B;
            --teal-dark: #235B5C;
            --gold: #F5A623;
            --gold-dark: #E09512;
            --gray-dark: #2D3A4B;
            --gray: #4A5568;
            --gray-light: #F8F9FA;
            --white: #FFFFFF;
            --green: #2E7D32;
            --red: #D32F2F;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.12);
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navigation */
        .navbar {
            background: var(--white);
            box-shadow: var(--shadow-sm);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .logo-imara {
            color: var(--navy);
        }

        .logo-capital {
            color: var(--teal);
        }

        .back-link {
            color: var(--gray);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            background: var(--gray-light);
        }

        .back-link:hover {
            color: var(--teal);
            background: rgba(44, 122, 123, 0.1);
            transform: translateX(-4px);
        }

        /* Main Content */
        .main-content {
            padding: 48px 0 80px;
        }

        /* Login Card */
        .login-card {
            background: var(--white);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--gray);
            font-size: 15px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--gray-dark);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group label .required {
            color: var(--red);
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--teal);
            font-size: 18px;
            opacity: 0.7;
            transition: all 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #E9EDF2;
            border-radius: 16px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            background: var(--white);
        }

        .form-group input:hover {
            border-color: #CBD5E1;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 4px rgba(44, 122, 123, 0.1);
        }

        .form-group input:focus + i {
            opacity: 1;
            color: var(--teal);
        }

        .form-group input.error {
            border-color: var(--red);
        }

        .error-message {
            color: var(--red);
            font-size: 12px;
            margin-top: 6px;
            display: block;
        }

        /* Password Options */
        .password-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--teal);
        }

        .remember-me span {
            font-size: 13px;
            color: var(--gray);
        }

        .forgot-link {
            font-size: 13px;
            color: var(--teal);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--teal-dark);
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--teal);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--teal-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(44, 122, 123, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--gray);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E9EDF2;
        }

        .divider span {
            margin: 0 16px;
        }

        /* Demo Credentials */
        .demo-credentials {
            background: linear-gradient(135deg, rgba(44, 122, 123, 0.05) 0%, rgba(44, 122, 123, 0.02) 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(44, 122, 123, 0.15);
        }

        .demo-credentials h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--teal);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .demo-credentials p {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .demo-credentials strong {
            color: var(--navy);
        }

        .demo-btn {
            background: transparent;
            border: 1px solid var(--teal);
            color: var(--teal);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .demo-btn:hover {
            background: var(--teal);
            color: var(--white);
        }

        /* Register Link */
        .register-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E9EDF2;
        }

        .register-link p {
            color: var(--gray);
            font-size: 14px;
        }

        .register-link a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Success/Error Messages */
        .alert-message {
            background: rgba(46, 125, 50, 0.1);
            border: 1px solid var(--green);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        .alert-message.error {
            background: rgba(211, 47, 47, 0.1);
            border-color: var(--red);
        }

        .alert-message i {
            font-size: 18px;
        }

        .alert-message.success i {
            color: var(--green);
        }

        .alert-message.error i {
            color: var(--red);
        }

        .alert-message span {
            font-size: 13px;
            color: var(--gray-dark);
            flex: 1;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }

            .login-header h1 {
                font-size: 28px;
            }

            .login-header p {
                font-size: 14px;
            }

            .form-group input {
                padding: 12px 16px 12px 44px;
                font-size: 15px;
            }

            .input-wrapper i {
                left: 14px;
                font-size: 16px;
            }

            .demo-credentials p {
                flex-direction: column;
                gap: 4px;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <span class="logo-imara">Imara</span><span class="logo-capital">Capital</span>
        </a>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</nav>

<!-- Main Content -->
<main class="main-content">
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in to access your account</p>
            </div>

            <!-- Alert Message (hidden initially) -->
            <div id="alertMessage" style="display: none;"></div>

            <form id="loginForm">
                <!-- Phone Number / Email -->
                <div class="form-group">
                    <label>Phone Number or Email <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="username" placeholder="0712345678 or email@example.com" autocomplete="username">
                    </div>
                    <div class="error-message" id="usernameError"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password">
                    </div>
                    <div class="error-message" id="passwordError"></div>
                    <div class="password-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" id="submitBtn">Sign In →</button>
            </form>

            <!-- Demo Credentials (for testing) -->
            <div class="demo-credentials">
                <h4><i class="fas fa-flask"></i> Demo Credentials</h4>
                <p><span><strong>Phone:</strong> 0712345678</span> <span><strong>Password:</strong> password123</span></p>
                <button type="button" class="demo-btn" id="demoFillBtn">Use Demo Credentials</button>
            </div>

            <div class="divider">
                <span>New to Imara Capital?</span>
            </div>

            <div class="register-link">
                <p><a href="register.html">Create an account</a> — It takes less than 2 minutes</p>
            </div>
        </div>
    </div>
</main>

<script>
    // Demo Credentials Fill
    const demoFillBtn = document.getElementById('demoFillBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const loginForm = document.getElementById('loginForm');
    const alertMessage = document.getElementById('alertMessage');

    demoFillBtn.addEventListener('click', () => {
        usernameInput.value = '0712345678';
        passwordInput.value = 'password123';
        // Clear any errors
        document.getElementById('usernameError').textContent = '';
        document.getElementById('passwordError').textContent = '';
        usernameInput.classList.remove('error');
        passwordInput.classList.remove('error');
        // Hide any existing alert
        alertMessage.style.display = 'none';
        // Trigger validation
        validateForm();
    });

    // Form Validation
    function validateForm() {
        let isValid = true;
        
        // Username (phone or email)
        const username = usernameInput.value.trim();
        const usernameError = document.getElementById('usernameError');
        const phoneRegex = /^07[0-9]{8}$|^01[0-9]{8}$|^[0-9]{9}$/;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if (username === '') {
            usernameError.textContent = 'Please enter your phone number or email';
            usernameInput.classList.add('error');
            isValid = false;
        } else if (!phoneRegex.test(username) && !emailRegex.test(username)) {
            usernameError.textContent = 'Enter a valid Kenyan phone number or email address';
            usernameInput.classList.add('error');
            isValid = false;
        } else {
            usernameError.textContent = '';
            usernameInput.classList.remove('error');
        }
        
        // Password
        const password = passwordInput.value;
        const passwordError = document.getElementById('passwordError');
        if (password === '') {
            passwordError.textContent = 'Please enter your password';
            passwordInput.classList.add('error');
            isValid = false;
        } else {
            passwordError.textContent = '';
            passwordInput.classList.remove('error');
        }
        
        return isValid;
    }
    
    // Real-time validation
    usernameInput.addEventListener('input', () => validateForm());
    passwordInput.addEventListener('input', () => validateForm());
    
    // Form Submission
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        if (validateForm()) {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Simulate authentication (check against registered users in localStorage)
            const registeredUser = localStorage.getItem('imaraUser');
            let isAuthenticated = false;
            let userData = null;
            
            if (registeredUser) {
                userData = JSON.parse(registeredUser);
                // Check if username matches phone or email, and password is correct (demo: password123)
                const phoneMatch = userData.phone === username;
                const emailMatch = userData.email && userData.email === username;
                
                // For demo purposes, accept 'password123' as valid password
                if ((phoneMatch || emailMatch) && password === 'password123') {
                    isAuthenticated = true;
                }
            }
            
            // Also allow demo credentials
            if ((username === '0712345678' && password === 'password123') || 
                (username === 'demo@imaracapital.co.ke' && password === 'password123')) {
                isAuthenticated = true;
                userData = { fullName: 'Demo User', phone: '0712345678', email: 'demo@imaracapital.co.ke' };
            }
            
            if (isAuthenticated) {
                // Store login session
                const session = {
                    isLoggedIn: true,
                    user: userData,
                    loginTime: new Date().toISOString(),
                    rememberMe: rememberMe
                };
                
                if (rememberMe) {
                    localStorage.setItem('imaraSession', JSON.stringify(session));
                } else {
                    sessionStorage.setItem('imaraSession', JSON.stringify(session));
                }
                
                // Show success message
                alertMessage.style.display = 'flex';
                alertMessage.className = 'alert-message success';
                alertMessage.innerHTML = `
                    <i class="fas fa-check-circle"></i>
                    <span>Welcome back, ${userData.fullName || 'Valued Customer'}! Redirecting to your dashboard...</span>
                `;
                
                // Disable submit button to prevent double submission
                submitBtn.disabled = true;
                
                // Redirect to dashboard after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                // Show error message
                alertMessage.style.display = 'flex';
                alertMessage.className = 'alert-message error';
                alertMessage.innerHTML = `
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Invalid credentials. Please check your phone number/email and password.</span>
                `;
                
                // Clear password field for security
                passwordInput.value = '';
                passwordInput.classList.add('error');
                
                // Auto-hide error after 4 seconds
                setTimeout(() => {
                    alertMessage.style.display = 'none';
                }, 4000);
            }
        }
    });
    
    // Check if already logged in
    function checkExistingSession() {
        const session = localStorage.getItem('imaraSession') || sessionStorage.getItem('imaraSession');
        if (session) {
            try {
                const sessionData = JSON.parse(session);
                if (sessionData.isLoggedIn) {
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                }
            } catch(e) {
                console.log('Invalid session');
            }
        }
    }
    
    // Run on page load
    checkExistingSession();
</script>

</body>
</html>
